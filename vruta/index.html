<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vruta · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    :root {
      --mid:     #0B1120;
      --mid2:    #131d30;
      --mid3:    #1a2640;
      --copper:  #B87333;
      --amber:   #D97706;
      --ice:     #F8FAFC;
      --graph:   #94A3B8;
      --green:   #22c55e;
      --red:     #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--mid);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Fondo con textura sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(184,115,51,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(184,115,51,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: var(--mid2);
      border: 0.5px solid rgba(184,115,51,0.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .logo-svg { flex-shrink: 0; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-main {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--ice);
      letter-spacing: 0.06em;
    }
    .logo-sub {
      font-size: 10px;
      color: var(--copper);
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    /* Título */
    .card-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--ice);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--graph);
      margin-bottom: 2rem;
    }

    /* Campos */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--graph);
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--graph);
      pointer-events: none;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 12px 11px 38px;
      font-size: 14px;
      color: var(--ice);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: rgba(184,115,51,0.5);
      background: rgba(184,115,51,0.05);
    }
    .field input::placeholder { color: rgba(148,163,184,0.5); }

    /* Botón */
    .btn-login {
      width: 100%;
      background: var(--copper);
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--ice);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.5rem;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 0.5px solid rgba(239,68,68,0.3);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 7px;
    }
    .error-msg.show { display: flex; }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-txt { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .card-footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid rgba(255,255,255,0.06);
      text-align: center;
      font-size: 11px;
      color: rgba(148,163,184,0.5);
    }
    .card-footer span { color: var(--copper); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <svg class="logo-svg" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="#B87333" stroke-width="1.5" fill="none"/>
      <circle cx="20" cy="20" r="11" stroke="#B87333" stroke-width="1" stroke-dasharray="3 2.5" fill="none" opacity="0.6"/>
      <circle cx="20" cy="20" r="4" fill="#B87333" opacity="0.85"/>
    </svg>
    <div class="logo-text">
      <span class="logo-main">VRUTA</span>
      <span class="logo-sub">powered by Etrazia</span>
    </div>
  </div>

  <div class="card-title">Bienvenido</div>
  <div class="card-sub">Ingresa tus credenciales para acceder al sistema</div>

  <div class="error-msg" id="errorMsg">
    <i class="ti ti-alert-circle"></i>
    <span id="errorTxt">Credenciales incorrectas</span>
  </div>

  <form id="loginForm">
    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <i class="ti ti-mail"></i>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email"/>
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">
      <div class="spinner"></div>
      <span class="btn-txt">Ingresar al sistema</span>
    </button>
  </form>

  <div class="card-footer">
    Sistema de rutas y entregas · <span>Vruta</span> · Suite E-Impact
  </div>
</div>

<script type="module">
  import { login, redirigirPorRol, getSesion } from "./assets/js/auth.js";

  // ── AUTO-LOGIN DEMO ───────────────────────────────────────────────────
  // Si viene del panel demo (demo.etraziapp.com), entrar directo sin login
  const demoSession = sessionStorage.getItem('vcontrol_demo_session');
  if (demoSession) {
    try {
      const sess = JSON.parse(demoSession);
      if (sess && sess.email && sess.uid) {
        // Inyectar sesión demo como operador y redirigir al dashboard
        sessionStorage.setItem('vruta_usuario', JSON.stringify({
          uid:    sess.uid,
          email:  sess.email,
          rol:    'operador',
          nombre: 'Demo EtraziApp',
          empresa_id: "demo"
        }));
        window.location.href = 'dashboard.html';
      }
    } catch(e) { /* sesión inválida, continuar con login normal */ }
  }
  // ─────────────────────────────────────────────────────────────────────

  // Si ya hay sesión activa, redirige directo
  const sesionActiva = getSesion();
  if (sesionActiva) redirigirPorRol(sesionActiva.rol);

  const form    = document.getElementById("loginForm");
  const btn     = document.getElementById("btnLogin");
  const errorEl = document.getElementById("errorMsg");
  const errorTx = document.getElementById("errorTxt");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    // Loading state
    btn.classList.add("loading");
    btn.disabled = true;
    errorEl.classList.remove("show");

    try {
      const usuario = await login(email, password);
      redirigirPorRol(usuario.rol);
    } catch (err) {
      console.error(err);
      let msg = "Credenciales incorrectas. Intenta nuevamente.";
      if (err.message.includes("no configurado")) msg = err.message;
      errorTx.textContent = msg;
      errorEl.classList.add("show");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
